name: Build

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/*"
      - "hotfix/*"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    name: Build (windows)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Auto-tag from release/hotfix branch
        if: |
          (startsWith(github.ref, 'refs/heads/release/') ||
           startsWith(github.ref, 'refs/heads/hotfix/')) &&
          github.event_name == 'push'
        shell: pwsh
        run: |
          $raw = ($env:GITHUB_REF_NAME -split '/')[-1]
          $ver = $raw.TrimStart('v')
          $parts = $ver.Split('.')
          while ($parts.Count -lt 3) {
            $parts += '0'
          }
          $tag = "v$($parts[0]).$($parts[1]).$($parts[2])"

          $exists = git ls-remote --tags origin "refs/tags/$tag"
          if ($exists) {
            "Tag $tag already exists, skipping auto-tag."
          } else {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag $tag
            git push origin $tag
            "Created and pushed tag $tag"
          }

      - name: Compute ref slug
        shell: pwsh
        run: |
          $slug = $env:GITHUB_REF_NAME -replace '/', '-'
          "REF_SLUG=$slug" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Patch version from tag or branch
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/heads/hotfix/')
        shell: pwsh
        run: |
          $raw = ($env:GITHUB_REF_NAME -split '/')[-1]
          $ver = $raw.TrimStart('v')
          $parts = $ver.Split('.')
          while ($parts.Count -lt 3) {
            $parts += '0'
          }
          $version = "$($parts[0]).$($parts[1]).$($parts[2])"

          (Get-Content "src-tauri/Cargo.toml") -replace '^version = "[^"]*"', "version = `"$version`"" | Set-Content "src-tauri/Cargo.toml"
          $tauriConf = Get-Content "src-tauri/tauri.conf.json" -Raw
          $tauriConf = [regex]::Replace(
            $tauriConf,
            '"version"\s*:\s*"[^"]*"',
            ('"version": "' + $version + '"'),
            1
          )
          Set-Content "src-tauri/tauri.conf.json" $tauriConf

          "Patched version to $version"
          Select-String -Path "src-tauri/Cargo.toml" -Pattern '^version\s*='
          Select-String -Path "src-tauri/tauri.conf.json" -Pattern '"version"'

      - name: Install JS dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      - name: Create Windows portable ZIP
        shell: pwsh
        run: |
          $slug = "${{ env.REF_SLUG }}"
          $exe = "src-tauri/target/release/quake-tools.exe"
          if (!(Test-Path -LiteralPath $exe)) {
            $candidate = Get-ChildItem -LiteralPath "src-tauri/target/release" -Filter "*.exe" | Where-Object { $_.Name -notlike "*setup*" } | Select-Object -First 1
            if ($null -eq $candidate) {
              throw "Unable to find built executable for portable ZIP."
            }
            $exe = $candidate.FullName
          }
          Compress-Archive -Path $exe -DestinationPath "quake-tools-windows-portable-$slug.zip"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quake-tools-windows-${{ env.REF_SLUG }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload Windows portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: quake-tools-windows-portable-${{ env.REF_SLUG }}
          path: quake-tools-windows-portable-${{ env.REF_SLUG }}.zip
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
